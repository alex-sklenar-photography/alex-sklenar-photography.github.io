<!DOCTYPE html>

<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koncerty - Alex Sklenár Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/png" href="logo-bez.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: #fff;
      line-height: 1.6;
      padding-top: 80px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: #000;
      transition: transform 0.3s ease-in-out;
    }
    header.hide { transform: translateY(-100%); }
    .logo{ display:flex; align-items:center; gap:10px; font-size:1.5rem; font-weight:800; text-decoration:none; color:#fff; }
    .logo img{ height:28px; width:auto; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
    nav { display: flex; gap: 15px; }
    nav a { color: #ccc; font-size: 0.9rem; text-decoration: none; }
    nav a:hover { color: #fff; }
    @media (max-width: 600px) {
      .menu-toggle { display: block; }
      nav { display: none; flex-direction: column; width: 100%; background: #111; margin-top: 10px; padding: 10px 0; }
      nav.active { display: flex; }
      nav a { margin: 10px 0; text-align: center; }
    }
    .hero { text-align: center; padding: 60px 20px 30px; }
    .hero h1 { font-size: 2.5rem; font-weight: 800; }
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 40px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 900px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .gallery { grid-template-columns: 1fr; } }
    .gallery-item { background: #111; border-radius: 10px; overflow: hidden; transition: transform 0.2s ease-in-out; }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-item img { width: 100%; height: 350px; object-fit: cover; }
    .gallery-item h3 { padding: 15px 20px; font-size: 1.4rem; }
    .gallery-item a { text-decoration: none; color: inherit; display: block; }
    footer { text-align: center; padding: 20px; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <header id="header">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Logo">
      Alex Sklenár
    </a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="main-nav">
      <a href="index.html">Portfólio</a>
      <a href="index.html#contact">Kontakt</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Koncerty</h1>
  </section>

  <section class="gallery">
    <div class="gallery-item">
      <a href="nitransky.html">
        <img src="photos/concerts/nitransky.jpg" alt="Nitransky">
        <h3>Nitránsky Rock and Roll 2025</h3>
      </a>
    </div>
    <div class="gallery-item">
      <a href="beania.html">
        <img src="photos/concerts/beania.jpg" alt="beania">
        <h3>Beánia právnikov Komenského 2025</h3>
      </a>
    </div>
    <div class="gallery-item">
      <a href="pil-c.html">
        <img src="photos/concerts/pil.jpg" alt="pil">
        <h3>Pil C a Raphael</h3>
      </a>
    </div>
    <div class="gallery-item">
      <a href="campana.html">
        <img src="photos/concerts/campana.jpg" alt="campana">
        <h3>Campana Batucada fest</h3>
      </a>
    </div>
    <div class="gallery-item">
      <a href="valentin.html">
        <img src="photos/concerts/valentin2025.jpg" alt="Valentin">
        <h3>Valentínsky ples 2025</h3>
      </a>
    </div>
    <div class="gallery-item">
      <a href="zatah.html">
        <img src="photos/concerts/zatah.jpg" alt="zatah">
        <h3>Záťah párty</h3>
      </a>
    </div>
  </section>

  <footer>
    &copy; <script>document.write(new Date().getFullYear())</script> Alex Sklenár. All rights reserved.
  </footer>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('main-nav');
      nav.classList.toggle('active');
    }

    let lastScroll = 0;
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll < lastScroll - 10) { header.classList.remove('hide'); }
      else if (currentScroll > lastScroll + 10) { header.classList.add('hide'); }
      lastScroll = currentScroll;
    });
  </script>

</body>
</html>
