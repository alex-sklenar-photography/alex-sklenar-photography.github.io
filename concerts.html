<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Alex Sklenár Photography</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:#fff;
}

/* HEADER (same as main site) */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #333;
flex-wrap:wrap;
position:fixed;
top:0;
width:100%;
background:#000;
z-index:1000;
transition:transform .3s;
}

header.hide{transform:translateY(-100%)}

.logo{font-size:1.5rem;font-weight:800}

.menu-toggle{display:none;font-size:1.5rem;cursor:pointer;color:#fff}

nav{display:flex;gap:15px}

nav a{color:#ccc;font-size:.9rem;text-decoration:none}

nav a:hover{color:#fff}

@media(max-width:600px){
.menu-toggle{display:block}
nav{
display:none;
flex-direction:column;
width:100%;
background:#111;
margin-top:10px;
padding:10px 0
}
nav.active{display:flex}
nav a{margin:10px 0;text-align:center}
}

.page-title{margin-top:120px;text-align:center;font-size:2.5rem;font-weight:800}

/* GALLERY ONLY CONTENT */
.gallery{
column-count:3;
column-gap:25px;
max-width:1200px;
margin:40px auto 60px auto;
padding:40px;
}

.gallery img{
width:100%;
margin-bottom:25px;
border-radius:8px;
break-inside:avoid;
transition:.2s;
cursor:pointer
}

.gallery img:hover{transform:scale(1.02)}

@media(max-width:900px){
.gallery{column-count:2}
}

@media(max-width:600px){
.gallery{column-count:1}
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.lightbox img{
max-width:95%;
max-height:95%;
border-radius:6px
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:#fff;
cursor:pointer;
user-select:none;
padding:20px;
}

.arrow.left{left:10px}
.arrow.right{right:10px}

/* FOOTER (same as main site) */
footer{
text-align:center;
padding:20px;
font-size:.9rem;
color:#666;
border-top:1px solid #222
}
</style>
</head>

<body>

<header id="header">
<div class="logo">Alex Sklenár</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="main-nav">
<a href="index.html">Portfolio</a>
<a href="about.html">About</a>
<a href="index.html#contact">Contact</a>
</nav>
</header>

<!-- PAGE TITLE -->
<div class="page-title">Koncerty</div>

<!-- ONLY GALLERY IN BODY -->
<section class="gallery" id="gallery"></section>

<div id="lightbox" class="lightbox">
<span class="arrow left" id="prev">❮</span>
<img id="lightbox-img" src="">
<span class="arrow right" id="next">❯</span>
</div>

<footer>
© <script>document.write(new Date().getFullYear())</script> Alex Sklenár Photography
</footer>

<script>

function toggleMenu(){
document.getElementById('main-nav').classList.toggle('active');
}

let lastScroll=0;
const header=document.getElementById('header');

window.addEventListener('scroll',()=>{
const current=window.pageYOffset;
if(current<lastScroll-10){header.classList.remove('hide')}else if(current>lastScroll+10){header.classList.add('hide')}
lastScroll=current;
});

// AUTOMATIC GALLERY LOADER
const folder = "photos/concerts/"; // change folder for other pages
const imageCount = 100; // change to how many photos you have

const gallery = document.getElementById("gallery");

for (let i = 1; i <= imageCount; i++) {
  const img = document.createElement("img");
  img.src = folder + i + ".jpg";
  gallery.appendChild(img);
}

// LIGHTBOX SYSTEM
let images = [];
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
const nextBtn=document.getElementById('next');
const prevBtn=document.getElementById('prev');

let currentIndex=0;

function refreshImages(){
  images=[...document.querySelectorAll('.gallery img')];

  images.forEach((img,i)=>{
    img.addEventListener('click',()=>{
      currentIndex=i;
      openImage();
    });
  });
}

function openImage(){
  lightbox.style.display='flex';
  lightboxImg.src=images[currentIndex].src;
}

function nextImage(){
  currentIndex=(currentIndex+1)%images.length;
  openImage();
}

function prevImage(){
  currentIndex=(currentIndex-1+images.length)%images.length;
  openImage();
}

nextBtn.onclick=(e)=>{e.stopPropagation();nextImage();}
prevBtn.onclick=(e)=>{e.stopPropagation();prevImage();}

lightbox.addEventListener('click',()=>{lightbox.style.display='none'});

document.addEventListener('keydown',(e)=>{
if(lightbox.style.display==='flex'){
if(e.key==='ArrowRight')nextImage();
if(e.key==='ArrowLeft')prevImage();
if(e.key==='Escape')lightbox.style.display='none';
}
});

let touchStartX=0;
let touchEndX=0;

lightbox.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX});
lightbox.addEventListener('touchend',e=>{
touchEndX=e.changedTouches[0].screenX;
if(touchEndX<touchStartX-50)nextImage();
if(touchEndX>touchStartX+50)prevImage();
});

// initialize gallery after images load
setTimeout(refreshImages,100);

</script>

</body>
</html>
